<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./style1.css">
</head>
<body>
    <div class="card">
        <div >
            <img src="./images/illustration-hero.svg" alt="">
        </div>
        <div class="content">
            <h1>Order Summary</h1>
            <p class="description">  You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!</p>
          <div class="plan-box">
            <div class="plan-left">
                <div class="icon">🎵</div>

                <div>
                    <h3>Annual Plan</h3>
                    <p>$59.0/year</p>
                </div>
            </div>
            <a href="#">Change</a>
          </div>
          <button class="payment-btn">Proceed to Payment</button>
          <button class="cancel-btn">Cancel Order</button>
        </div>
    </div>
</body>
</html>
